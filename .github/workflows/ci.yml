name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Check lockfile sync
        run: npm ci --dry-run --ignore-scripts --no-audit --no-fund
      - run: npm ci
      - run: npm run ci:local
