name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Check lockfile sync
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json is out of sync. Run npm install locally and commit the updated lockfile."
            exit 1
          }
      - run: npm ci
      - run: npm run ci:local
